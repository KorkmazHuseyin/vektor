name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller matplotlib numpy
      - run: pyinstaller --onefile --windowed vektor.py
      - uses: actions/upload-artifact@v4
        with:
          name: uygulama-exe
          path: dist/